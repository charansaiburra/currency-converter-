# ==========================================
# Server Port Configuration
# ==========================================
server.port=8080

# ==========================================
# ==========================================
# [ACTIVE] In-Memory H2 Database
# ==========================================
spring.datasource.url=jdbc:h2:mem:currencydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# [PRODUCTION FALLBACK] MySQL Database Configuration
# To toggle MySQL, uncomment the lines below and comment out the H2 lines above.
# ==========================================
