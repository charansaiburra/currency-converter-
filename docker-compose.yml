version: '3.8'

services:
  # ==========================================
  # MySQL 8 Persistent Database Service
  # ==========================================
  db:
    image: mysql:8.0
    container_name: apexconvert-mysql
    restart: always
    environment:
      MYSQL_DATABASE: currencydb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Containerized Spring Boot App Service
  # ==========================================
  app:
    build: .
    container_name: apexconvert-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inject dynamic database connection parameters linking to the container DB service
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/currencydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      
      # Hibernate behaviors mapping to production MySQL Dialects
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      
      # JWT Encryption Secret Keys
      JWT_SECRET: APEXCONVERT_PRODUCTION_JWT_SECRET_KEY_SIGNING_2026_COMPACT
      
      # SMTP Mail dispatch credentials (configure these on your cloud host)
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your-email@gmail.com
      SPRING_MAIL_PASSWORD: your-gmail-app-password
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"

volumes:
  mysql_data:
